<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rank Flow Digital</title>
    <!--
      SPA fallback for static hosting (GitHub Pages).
      When a user navigates directly to a clean URL like /about or /blog/post,
      the server may return 404 with this page. We fetch index.html and write
      it to the document so the React client-side router can resolve the path.
    -->
    <script>
      (function () {
        fetch('/')
          .then(function (res) { return res.text(); })
          .then(function (html) {
            document.open();
            document.write(html);
            document.close();
          })
          .catch(function () {
            window.location.href = '/';
          });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
