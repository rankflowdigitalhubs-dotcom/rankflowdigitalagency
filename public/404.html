<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rank Flow Digital</title>
    <!--
      GitHub Pages SPA fallback. GitHub Pages serves this 404.html for any
      unknown path. We redirect to the app root and carry the requested path
      into the hash so the client-side router can resolve it.
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 0; // project site: set to 1 for <user>.github.io/<repo>
        var l = window.location;
        var path = l.pathname
          .split('/')
          .slice(0, 0 - pathSegmentsToKeep - 1)
          .join('/') + '/';
        var redirect = l.protocol + '//' + l.host + path + '#' + l.pathname + l.search;
        l.replace(redirect);
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=./" />
  </head>
  <body>
    <p>Redirecting to <a href="./">Rank Flow Digital</a>…</p>
  </body>
</html>
