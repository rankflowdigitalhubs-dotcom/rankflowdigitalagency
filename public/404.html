<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rank Flow Digital</title>
    <!--
      SPA fallback for static hosting (GitHub Pages, Netlify, etc.).
      When a user navigates directly to a clean URL like /about or /blog/post,
      the server may return a 404. This page replicates index.html so the
      React app boots and the History API router resolves the path.
    -->
    <script>
      (function () {
        // If we're already at the root, don't redirect — just load the app.
        if (window.location.pathname === '/' || window.location.pathname === '') return;
        // Otherwise, fetch the real index.html and write it to the document.
        // This preserves the current URL so the client-side router can resolve it.
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/', false);
        xhr.send();
        document.open();
        document.write(xhr.responseText);
        document.close();
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=/" />
  </head>
  <body>
    <p>Redirecting to <a href="/">Rank Flow Digital</a>…</p>
  </body>
</html>
