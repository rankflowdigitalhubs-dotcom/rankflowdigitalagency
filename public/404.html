<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rank Flow Digital</title>
    <!--
      SPA fallback for static hosting (GitHub Pages, Netlify, etc.).
      When a user navigates directly to a clean URL like /about or /blog/post,
      the server may return a 404. This page fetches index.html via XHR and
      writes it to the document, preserving the current URL so the React
      client-side router can resolve the path. No meta-refresh redirect.
    -->
    <script>
      (function () {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/', false);
        xhr.send();
        document.open();
        document.write(xhr.responseText);
        document.close();
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
